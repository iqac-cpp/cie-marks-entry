<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CIE Marks Entry Portal - GDC Cheepurupalli</title>
  <meta name="description" content="Continuous Internal Evaluation Marks Entry Portal - GDC Cheepurupalli" />
  <meta name="theme-color" content="#1f5bb5" />

  <!-- GitHub Pages direct-open page for the final Apps Script web app -->
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec" />

  <style>
    :root {
      --blue: #1f5bb5;
      --blue-light: #2574d8;
      --bg: #eef4ff;
      --card: #ffffff;
      --text: #10213f;
      --muted: #5f6f89;
      --border: #dbe6f7;
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 116, 216, 0.16), transparent 34%),
        linear-gradient(180deg, #f7faff 0%, var(--bg) 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(18px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: clamp(22px, 5vw, 34px);
      box-shadow: 0 10px 30px rgba(20, 50, 90, 0.14);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 9px 16px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: white;
      font-weight: 800;
      font-size: clamp(14px, 3.6vw, 16px);
      line-height: 1.2;
      word-break: break-word;
    }

    h1 {
      margin: 0;
      color: #0f2b56;
      font-size: clamp(24px, 7vw, 38px);
      line-height: 1.12;
      letter-spacing: -0.4px;
    }

    .subtitle {
      margin: 14px auto 22px;
      max-width: 460px;
      color: var(--muted);
      font-size: clamp(15px, 4vw, 17px);
      line-height: 1.55;
    }

    .loader {
      width: 44px;
      height: 44px;
      margin: 2px auto 18px;
      border: 4px solid #dbe8ff;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn {
      width: 100%;
      max-width: 320px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 800;
      font-size: 16px;
      text-decoration: none;
      border: 1px solid var(--blue);
      box-shadow: 0 6px 16px rgba(31, 91, 181, 0.22);
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .small {
      margin-top: 16px;
      color: #6b7890;
      font-size: 13px;
      line-height: 1.45;
    }

    noscript .no-js {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7e6;
      color: #6b4a00;
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 420px) {
      .page {
        align-items: flex-start;
        padding-top: max(28px, env(safe-area-inset-top));
      }

      .card {
        border-radius: 18px;
        padding: 22px 16px;
      }

      .subtitle {
        margin-bottom: 18px;
      }

      .loader {
        width: 38px;
        height: 38px;
        border-width: 3px;
      }
    }

    @media (max-height: 560px) {
      .page {
        align-items: flex-start;
      }

      .card {
        margin-top: 10px;
      }

      .subtitle {
        margin-bottom: 14px;
      }
    }
  </style>

  <script>
    // Directly open the official Apps Script web app.
    window.location.replace("https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec");
  </script>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="CIE Marks Entry Portal">
      <div class="badge">GDC Cheepurupalli</div>
      <h1>Continuous Internal Evaluation Marks Entry</h1>
      <p class="subtitle">Opening the official CIE Marks Entry Portal. Please wait...</p>
      <div class="loader" aria-hidden="true"></div>
      <a class="btn" href="https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec">Open CIE Portal</a>
      <div class="small">Tap the button only if the portal does not open automatically.</div>
      <noscript>
        <div class="no-js">JavaScript is disabled. Please tap “Open CIE Portal” to continue.</div>
      </noscript>
    </section>
  </main>
</body>
</html>
