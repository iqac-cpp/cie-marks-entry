<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIE Marks Entry Portal - GDC Cheepurupalli</title>
  <meta name="description" content="Continuous Internal Evaluation Marks Entry Portal - GDC Cheepurupalli" />

  <!-- Directly open the final Apps Script web app from GitHub Pages -->
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec" />

  <style>
    :root {
      --blue: #1f5bb5;
      --blue2: #2574d8;
      --bg: #eef3fb;
      --text: #10213f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: #ffffff;
      border-radius: 24px;
      padding: 34px;
      box-shadow: 0 10px 34px rgba(15, 35, 68, 0.14);
      text-align: center;
      border: 1px solid #d9e4f4;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
      border-radius: 999px;
      padding: 9px 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.15;
      color: #0f2b56;
    }

    p {
      margin: 0 0 24px;
      font-size: 17px;
      color: #53627a;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 24px;
      border-radius: 14px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--blue);
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7890;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 18px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>

  <script>
    window.location.replace("https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec");
  </script>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">GDC Cheepurupalli</div>
      <h1>Continuous Internal Evaluation Marks Entry</h1>
      <p>Opening the CIE Marks Entry Portal...</p>
      <a class="btn" href="https://script.google.com/macros/s/AKfycbyBQv6sdtv0JWT1CrlYsk5ZsOYSML_-9EOYcS1RryEfAAviS0poBmHanR96U9Ob7jBP/exec">Open CIE Portal</a>
      <div class="small">Use this button only if the portal does not open automatically.</div>
    </section>
  </main>
</body>
</html>
